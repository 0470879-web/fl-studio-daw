<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL Studio-like DAW Interface</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>FL Studio-like DAW</h1>
        </header>
        <section class="channel-rack">
            <h2>Channel Rack</h2>
            <div class="channels">
                <div class="channel">Channel 1</div>
                <div class="channel">Channel 2</div>
                <div class="channel">Channel 3</div>
                <div class="channel">Channel 4</div>
            </div>
        </section>
        <section class="playlist">
            <h2>Playlist</h2>
            <div class="tracks">
                <div class="track">Track 1</div>
                <div class="track">Track 2</div>
                <div class="track">Track 3</div>
            </div>
        </section>
        <section class="mixer">
            <h2>Mixer</h2>
            <div class="mixers">
                <div class="mixer-channel">Mixer Channel 1</div>
                <div class="mixer-channel">Mixer Channel 2</div>
            </div>
        </section>
        <section class="audio-controls">
            <h2>Audio Controls</h2>
            <button class="play">Play</button>
            <button class="stop">Stop</button>
            <button class="record">Record</button>
        </section>
    </div>
</body>
</html>
